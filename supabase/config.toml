# Minimal Supabase CLI config for local migrations.
# See https://supabase.com/docs/guides/cli/config

project_id = "vodora"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true

[db.seed]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
# Access token (JWT) lifetime in seconds. Production: set the same value in
# Supabase Dashboard → Authentication → Settings → JWT expiry (7200 = 2 hours).
jwt_expiry = 7200

[auth.email]
enable_signup = true
double_confirm_changes = false
# Verification emails are sent via SMTP (see src/lib/auth/email-verification.ts).
# Disable Supabase confirmation emails to avoid duplicates.
enable_confirmations = false

[auth.email.template.confirmation]
subject = "Verify your Vodora account"
content_path = "./supabase/templates/confirmation.html"
